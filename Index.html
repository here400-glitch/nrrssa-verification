<!DOCTYPE html>
<html>
<head>
  <title>NRRSSA-E Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('./bg.png') center/cover no-repeat;
      opacity: 0.75;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: -1;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      font-size: 14px;
    }

    .logo {
      color: #00ffae;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      margin-top: 80px;
    }

    .hero h1 {
      font-size: 38px;
    }

    .hero p {
      color: #aaa;
      max-width: 500px;
      margin: auto;
    }

    .card {
      margin: 60px auto;
      max-width: 520px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,255,174,0.2);
    }

    .label {
      text-align: left;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1db954;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #reader {
      margin-top: 10px;
    }

    #result {
      margin-top: 25px;
      display: none;
      padding: 20px;
      border-radius: 12px;
      background: rgba(0,255,174,0.08);
      border: 1px solid rgba(0,255,174,0.2);
    }

    .success {
      color: #00ffae;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #777;
      margin-top: 40px;
      padding-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="nav">
  <div class="logo">NRRSSA-E</div>
  <div>Home &nbsp; Verify</div>
</div>

<div class="hero">
  <h1>Internship and Certificate Verification</h1>
  <p>Verify internship and training records issued under the NRRSSA-E initiative.</p>
</div>

<div class="card">

  <div class="label">ENTER CERTIFICATE ID</div>
  <input id="certId" placeholder="NRRSSA-XXXX-XXXX-XXX-XXX">

  <button onclick="verify()">Verify Record →</button>
  <button onclick="startQR()">Scan QR</button>

  <div id="reader"></div>
  <div id="result"></div>

</div>

<div class="footer">
  THIS RECORD IS MAINTAINED BY THE NRRSSA-E INITIATIVE FOR VERIFICATION PURPOSES.
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb879CZS3gp0E5507ia7ZPKKgv3b0rCQ",
  authDomain: "nrrssa-e.firebaseapp.com",
  projectId: "nrrssa-e",
  storageBucket: "nrrssa-e.appspot.com",
  messagingSenderId: "617591898409",
  appId: "1:617591898409:web:35ab15426c4fbd94a3ea00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.verify = async function() {
  const id = document.getElementById("certId").value.trim();
  const result = document.getElementById("result");

  if (!id) {
    result.style.display = "block";
    result.innerHTML = "Enter Certificate ID";
    return;
  }

  const snap = await getDoc(doc(db, "Certificates", id));

  if (snap.exists()) {
    const data = snap.data();

    result.style.display = "block";
    result.innerHTML = `
      <div class="success">✔ Verified by NRRSSA-E</div>
      <div><b>Name:</b> ${data.name || "-"}</div>
      <div><b>Division:</b> ${data.division || "-"}</div>
      <div><b>Program:</b> ${data.program || "-"}</div>
      <div><b>Duration:</b> ${data.duration || "-"}</div>
    `;
  } else {
    result.style.display = "block";
    result.innerHTML = "Invalid Certificate";
  }
};

window.startQR = function() {
  const qr = new Html5Qrcode("reader");
  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      document.getElementById("certId").value = decodedText;
      qr.stop();
      verify();
    }
  );
};

/* AUTO VERIFY FROM URL */
const params = new URLSearchParams(window.location.search);
const certFromURL = params.get("cert");

if (certFromURL) {
  document.getElementById("certId").value = certFromURL;
  verify();
}
</script>

</body>
</html>
