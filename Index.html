<!DOCTYPE html>
<html>
<head>
  <title>NRRSSA-E Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('./bg.png') center/cover no-repeat;
      opacity: 0.75;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: -1;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      font-size: 14px;
    }

    .logo {
      color: #00ffae;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      margin-top: 80px;
    }

    .hero h1 {
      font-size: 38px;
    }

    .hero p {
      color: #aaa;
      max-width: 500px;
      margin: auto;
    }

    .card {
      margin: 60px auto;
      max-width: 500px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1db954;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #reader {
      margin-top: 15px;
    }

    #details {
      display: none;
    }

    #result {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="nav">
  <div class="logo">NRRSSA-E</div>
  <div>Home &nbsp; Verify</div>
</div>

<div class="hero">
  <h1>Internship and Certificate Verification</h1>
  <p>Verify records issued under NRRSSA-E initiative</p>
</div>

<div class="card">

  <input id="certId" placeholder="NRRSSA-XXXX-XXXX-XXX-XXX">

  <button onclick="verify()">Verify Record</button>
  <button onclick="startQR()">Scan QR</button>

  <div id="reader"></div>

  <!-- DETAILS FORM -->
  <div id="details">
    <input id="name" placeholder="Your Name">
    <input id="email" placeholder="Email">
    <input id="org" placeholder="Organization">
    <input id="purpose" placeholder="Purpose">
    <input id="location" placeholder="Location">

    <button onclick="submitDetails()">Submit Verification</button>
  </div>

  <div id="result"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb879CZS3gp0E5507ia7ZPKKgv3b0rCQ",
  authDomain: "nrrssa-e.firebaseapp.com",
  projectId: "nrrssa-e",
  storageBucket: "nrrssa-e.appspot.com",
  messagingSenderId: "617591898409",
  appId: "1:617591898409:web:35ab15426c4fbd94a3ea00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.verify = async function() {
  const id = document.getElementById("certId").value.trim();
  const result = document.getElementById("result");

  if (!id) {
    result.innerHTML = "Enter Certificate ID";
    return;
  }

  const snap = await getDoc(doc(db, "Certificates", id));

  if (snap.exists()) {
    result.innerHTML = "Certificate Found";
    document.getElementById("details").style.display = "block";
  } else {
    result.innerHTML = "Invalid Certificate";
  }
};

window.submitDetails = async function() {
  const data = {
    certId: document.getElementById("certId").value,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    org: document.getElementById("org").value,
    purpose: document.getElementById("purpose").value,
    location: document.getElementById("location").value,
    time: new Date().toISOString()
  };

  await addDoc(collection(db, "Verifications"), data);

  document.getElementById("result").innerHTML =
    "Verification Completed and Logged";
};

window.startQR = function() {
  const qr = new Html5Qrcode("reader");
  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      document.getElementById("certId").value = decodedText;
      qr.stop();
    }
  );
};
</script>

</body>
</html>
