<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('bg.png') center/cover no-repeat;
      opacity: 0.75;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .container {
      margin-top: 100px;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      backdrop-filter: blur(8px);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #17a74a;
      transform: scale(1.02);
    }

    #result {
      margin-top: 20px;
      display: none;
      background: rgba(255,255,255,0.12);
      padding: 15px;
      border-radius: 8px;
    }

    .error {
      color: #ff4d4d;
    }

    .success {
      color: #4dff88;
    }
  </style>
</head>

<body>

  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>Certificate Verification</h1>
    <p>Verify internship and training records issued under the NRRSSA E Initiative.</p>

    <div class="card">
      <input type="text" id="certId" placeholder="NRRSSA-XXXX-XXXX-XXX-XXX">
      <button onclick="verify()">Verify Certificate</button>

      <div id="result"></div>
    </div>
  </div>

  <script>
    function verify() {
      const id = document.getElementById("certId").value.trim();
      const resultDiv = document.getElementById("result");

      if (!id) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<span class='error'>Please enter Certificate ID</span>";
        return;
      }

      // Temporary demo logic
      if (id === "NRRSSA-KALLX-2026-SD-001") {
        resultDiv.style.display = "block";
        resultDiv.innerHTML =
          "<span class='success'><b>Verification Successful</b></span><br>Name: Sameer Khichindia<br>Email: theoclayt@gmail.com";
      } else {
        resultDiv.style.display = "block";
        resultDiv.innerHTML =
          "<span class='error'>Certificate not found</span>";
      }
    }
  </script>

</body>
</html>
