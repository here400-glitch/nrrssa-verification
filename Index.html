<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    /* Background image */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('bg.png') center/cover no-repeat;
      opacity: 0.75;
      z-index: -2;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    /* Container */
    .container {
      margin-top: 100px;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #17a74a;
    }

    #result {
      margin-top: 20px;
      display: none;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg-image"></div>
  <div class="overlay"></div>

  <!-- Content -->
  <div class="container">
    <h1>Certificate Verification</h1>
    <p>Verify internship and training records issued under the NRRSSA E Initiative.</p>

    <div class="card">
      <input type="text" id="certId" placeholder="NRRSSA-XXXX-XXXX-XXX-XXX">
      <button onclick="verify()">Verify Certificate</button>

      <div id="result"></div>
    </div>
  </div>

  <script>
    function verify() {
      const id = document.getElementById("certId").value.trim();
      const resultDiv = document.getElementById("result");

      if (!id) {
        alert("Enter Certificate ID");
        return;
      }

      // Dummy success for now
      resultDiv.style.display = "block";
      resultDiv.innerHTML = "<b>Verification Successful</b><br>Certificate ID: " + id;
    }
  </script>

</body>
</html>
