<!DOCTYPE html>
<html>
<head>
  <title>NRRSSA-E Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('bg.png') center/contain no-repeat;
      opacity: 0.75;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: -1;
    }

    .container {
      margin-top: 120px;
      padding: 20px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,150,0.3);
      backdrop-filter: blur(15px);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input {
      background: rgba(0,50,30,0.4);
      color: white;
    }

    button {
      background: #1f7a5a;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      display: none;
      padding: 15px;
      border-radius: 10px;
      background: rgba(0,255,150,0.1);
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <h2>Certificate Verification</h2>

  <div class="card">
    <input id="certId" placeholder="NRRSSA-KALLX-XXXX-XX-XXX">
    <button onclick="verify()">Verify</button>
    <div id="result"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb879CZS3gp0E5507ia7ZPKKgv3b0rCQ",
  authDomain: "nrrssa-e.firebaseapp.com",
  projectId: "nrrssa-e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[m];
  });
}

window.verify = async function() {

  const id = document.getElementById("certId").value.trim();
  const result = document.getElementById("result");

  // 🔐 RATE LIMIT
  const last = localStorage.getItem("lastTry");
  const now = Date.now();
  if (last && now - last < 3000) {
    alert("Slow down.");
    return;
  }
  localStorage.setItem("lastTry", now);

  // 🔐 FORMAT VALIDATION
  if (!/^NRRSSA-[A-Z0-9-]+$/.test(id)) {
    alert("Invalid ID format");
    return;
  }

  if (id.length < 15 || id.length > 40) {
    alert("Invalid ID length");
    return;
  }

  // 🔐 ENUMERATION DELAY
  await new Promise(r => setTimeout(r, 1000));

  try {
    const snap = await getDoc(doc(db, "Certificates", id));

    result.style.display = "block";

    if (snap.exists()) {
      const d = snap.data();

      result.innerHTML = `
        <b>Verified</b><br>
        Name: ${escapeHTML(d.name)}<br>
        Division: ${escapeHTML(d.division)}<br>
        Program: ${escapeHTML(d.program)}<br>
        Duration: ${escapeHTML(d.duration)}
      `;

      // 🔐 DUPLICATE SPAM PREVENTION
      const lastID = localStorage.getItem("lastID");
      if (lastID !== id) {
        localStorage.setItem("lastID", id);

        await addDoc(collection(db, "verificationLogs"), {
          certificate_id: id,
          requester_name: "anonymous",
          requester_email: "anonymous",
          timestamp: new Date()
        });
      }

    } else {
      result.innerHTML = "Invalid Certificate";
    }

  } catch (e) {
    result.innerHTML = "Error verifying";
  }
};

// 🔐 AUTO VERIFY
const params = new URLSearchParams(window.location.search);
const cert = params.get("cert");
if (cert) {
  document.getElementById("certId").value = cert;
  verify();
}
</script>

</body>
</html>
