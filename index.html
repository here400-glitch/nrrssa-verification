<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification | NRRSSA - E</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  max-width: 500px;
  width: 90%;
  border-radius: 10px;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

input, button, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#formSection {
  display: none;
}

#result {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">
  <h1>Certificate Verification</h1>
  <p>Verify internship and training records issued under the NRRSSA - E initiative.</p>

  <input type="text" id="certificateId" placeholder="NRRSSA - KALLX - XXXX - XX - XXX">
  <button onclick="startVerification()">Verify</button>

  <div id="formSection">
    <h3>Verification Details</h3>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="organization" placeholder="Organization / Company">
    <input type="text" id="purpose" placeholder="Purpose of Verification">
    <input type="text" id="location" placeholder="Location">

    <button onclick="verifyCertificate()">Proceed to Verification</button>

    <p style="font-size: 12px; margin-top: 10px;">
      The information provided will be used only for verification tracking and will not be shared externally.
    </p>
  </div>

  <div id="result"></div>
</div>

<script>
let enteredId = "";

function startVerification() {
  enteredId = document.getElementById("certificateId").value.trim();
  if (!enteredId) {
    alert("Please enter Certificate ID");
    return;
  }
  document.getElementById("formSection").style.display = "block";
}

async function verifyCertificate() {
  const docRef = window.db.collection("Certificates").doc(enteredId);
  const docSnap = await docRef.get();

  const resultDiv = document.getElementById("result");

  if (docSnap.exists) {
    const data = docSnap.data();

    resultDiv.innerHTML = `
      <h3>Verification Status: Verified</h3>
      <p><strong>Name:</strong> ${data.name}</p>
      <p><strong>Certificate ID:</strong> ${enteredId}</p>
      <p><strong>Division:</strong> ${data.division}</p>
      <p><strong>Program:</strong> ${data.program}</p>
      <p><strong>Duration:</strong> ${data.duration}</p>
      <p><strong>Issued under:</strong> NRRSSA - E Initiative</p>
    `;
  } else {
    resultDiv.innerHTML = `
      <p>No record found for this Certificate ID.<br>
      Please check the ID or contact: your@email.com</p>
    `;
  }
}
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.6/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.6/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD879czIS39p0E5507iA7ZpKKgv3b0rCQ",
  authDomain: "nrrssa-e.firebaseapp.com",
  projectId: "nrrssa-e",
  storageBucket: "nrrssa-e.appspot.com",
  messagingSenderId: "617591889409",
  appId: "1:617591889409:web:35ab15426c4fbd94a3ea00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = {
  collection: (name) => ({
    doc: (id) => ({
      get: async () => {
        const ref = doc(db, name, id);
        const snap = await getDoc(ref);
        return {
          exists: snap.exists(),
          data: () => snap.data()
        };
      }
    })
  })
};
</script>

</body>
</html>
