<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
    }

    input, button {
      width: 90%;
      max-width: 400px;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Certificate Verification</h1>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<br>
<button onclick="verify()">Verify</button>

<div id="result" class="box" style="display:none;"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb879CZIS39p0E5507iA7ZpKKgv3b0rCQ",
  authDomain: "nrrssa-e.firebaseapp.com",
  projectId: "nrrssa-e",
  storageBucket: "nrrssa-e.firebasestorage.app",
  messagingSenderId: "617591889409",
  appId: "1:617591889409:web:35ab15426c4fbd94a3ea09"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.verify = async function () {
  const id = document.getElementById("certId").value.trim();

  if (!id) {
    alert("Enter Certificate ID");
    return;
  }

  const docRef = doc(db, "Certificates", id);
  const docSnap = await getDoc(docRef);

  const resultDiv = document.getElementById("result");

  if (docSnap.exists()) {
    const data = docSnap.data();

    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
      <h3>Verification Successful</h3>
      <p><b>Name:</b> ${data.name}</p>
      <p><b>Division:</b> ${data.division}</p>
      <p><b>Program:</b> ${data.program}</p>
      <p><b>Duration:</b> ${data.duration}</p>
    `;
  } else {
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `<p>Certificate not found</p>`;
  }
};

</script>

</body>
</html>
